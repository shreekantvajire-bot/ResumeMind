<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bharat Abhyasika</title>
  <style>
    :root{--navy1:#071632;--navy2:#19396f;--bg:#f5f7fb;--card:#fff;--muted:#6b7280;--ok:#16a34a;--warn:#f59e0b;--danger:#dc2626;--blue:#2563eb}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:#111}
    .hidden{display:none!important}.container{max-width:1240px;margin:auto;padding:16px}.card{background:var(--card);border-radius:14px;padding:16px;box-shadow:0 8px 22px rgba(0,0,0,.06)}
    input,select,textarea,button{width:100%;padding:10px;border:1px solid #d6dbe5;border-radius:8px} button{background:#1d4ed8;color:#fff;border:0;cursor:pointer}
    .row{display:grid;gap:12px}.row-2{grid-template-columns:1fr 1fr}.row-3{grid-template-columns:repeat(3,1fr)} .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--navy1),var(--navy2));color:#fff}.login .card{width:min(420px,92vw)}
    .logo{font-size:42px;font-weight:800;text-align:center}.help{color:#c5cce0;font-size:12px}.err{color:#ffb4b4;font-size:13px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{width:auto;padding:8px 12px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .students{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}.student{transition:.2s}.student:hover{transform:translateY(-4px)}
    .badge{padding:2px 8px;border-radius:12px;color:#fff;font-size:12px}.b-blue{background:#2563eb}.b-pink{background:#db2777}.b-green{background:#16a34a}.b-gray{background:#6b7280}
    .table{width:100%;border-collapse:collapse}.table th,.table td{padding:8px;border-bottom:1px solid #e8ecf3;text-align:left;font-size:13px}
    .hero{color:#fff;background:linear-gradient(145deg,#0f172a,#1e293b);padding:20px;border-radius:14px}.amen{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:grid;place-items:center;padding:10px}.modal .card{width:min(740px,95vw);max-height:92vh;overflow:auto}
    @media (max-width:900px){.row-2,.row-3{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="login" class="login"></div>
<div id="app" class="container hidden"></div>
<script>
const KEY='bharatAbhyasikaStateV3';
const state=JSON.parse(localStorage.getItem(KEY)||'{"admin":null,"current":null,"students":[],"payments":[]}');
const $=id=>document.getElementById(id), save=()=>localStorage.setItem(KEY,JSON.stringify(state));
const now=()=>new Date().toISOString().slice(0,10), money=n=>`₹${Number(n||0)}`;
const uname=u=>/^[A-Za-z0-9_]{4,20}$/.test((u||'').trim()), pass=p=>(p||'').length>=6;
const byId=id=>state.students.find(s=>s.id===id), month=d=>new Date(d).toLocaleString('en-US',{month:'short',year:'numeric'});
const paid=s=>state.payments.filter(p=>p.studentId===s.id).reduce((a,b)=>a+Number(b.amount||0),0);
const due=s=>{const j=new Date(s.joinDate||now());const m=Math.max(1,((new Date().getFullYear()-j.getFullYear())*12)+(new Date().getMonth()-j.getMonth())+1);return m*Number(s.fee||500)-paid(s)};
const usernames=()=>[state.admin?.username,...state.students.map(s=>s.credentials?.username)].filter(Boolean);
function loginUI(msg=''){ $('app').classList.add('hidden'); $('login').classList.remove('hidden');
  if(!state.admin){$('login').innerHTML=`<div class='card'><div class='logo'>भारत</div><h3>Admin First-Time Setup</h3><div class='row'><input id='an' placeholder='Admin Full Name'><input id='au' placeholder='Choose Username'><input id='ap' type='password' placeholder='Choose Password'><input id='ac' type='password' placeholder='Confirm Password'><button onclick='setupAdmin()'>Create Admin</button>${msg?`<div class='err'>${msg}</div>`:''}</div></div>`;return}
  $('login').innerHTML=`<div class='card'><div class='logo'>भारत</div><h3>Bharat Abhyasika Login</h3><div class='row'><input id='lu' placeholder='Username'><input id='lp' type='password' placeholder='Password'><button onclick='doLogin()'>Login</button>${msg?`<div class='err'>${msg}</div>`:''}<div class='help'>Contact your admin if you forgot your login details — 08421943463</div></div></div>`;
}
function setupAdmin(){const n=$('an').value.trim(),u=$('au').value.trim(),p=$('ap').value,c=$('ac').value; if(!n)return loginUI('Admin full name required'); if(!uname(u))return loginUI('Username must be 4-20 (letters, numbers, underscore only)'); if(!pass(p))return loginUI('Password must be at least 6 characters'); if(p!==c)return loginUI('Passwords do not match'); state.admin={name:n,username:u,password:p,createdDate:now()}; state.current={role:'admin'}; save(); render();}
function doLogin(){const u=$('lu').value.trim(),p=$('lp').value; if(state.admin&&u===state.admin.username&&p===state.admin.password){state.current={role:'admin'};save();return render();} const st=state.students.find(s=>s.credentials.username===u&&s.credentials.password===p); if(!st)return loginUI('Invalid username or password'); state.current={role:'student',id:st.id};save();render();}
let view='dashboard';
const tabs=['dashboard','students','payments','facilities','contact','credentials'];
function render(){if(!state.current)return loginUI(); $('login').classList.add('hidden'); $('app').classList.remove('hidden'); state.current.role==='admin'?renderAdmin():renderStudent();}
function totals(){const active=state.students.filter(s=>s.status==='Active'), all=state.payments.reduce((a,b)=>a+Number(b.amount||0),0), m=month(new Date()); return {active:active.length,boys:active.filter(s=>s.gender==='Boy').length,girls:active.filter(s=>s.gender==='Girl').length,all,month:state.payments.filter(p=>p.forMonth===m).reduce((a,b)=>a+Number(b.amount||0),0),pending:state.students.filter(s=>due(s)>0).length}}
function renderAdmin(){const t=totals(); $('app').innerHTML=`<div class='top'><h2>Bharat Abhyasika Admin</h2><div class='tabs'>${tabs.map(v=>`<button onclick="view='${v}';renderAdmin()">${v}</button>`).join('')}<button onclick='logout()'>Logout</button></div></div>${viewPage(t)}`}
function viewPage(t){if(view==='dashboard')return `<div class='stats'><div class='card'>Active: ${t.active} (Boys ${t.boys} / Girls ${t.girls})</div><div class='card'>Total Collected: ${money(t.all)}</div><div class='card'>This Month: ${money(t.month)}</div><div class='card'>Pending Students: ${t.pending}</div></div><div class='row row-2'><div class='card'><h3>Pending Fees</h3>${state.students.filter(s=>due(s)>0).map(s=>`<div>${s.name} (${money(due(s))}) <button onclick='openPay("${s.id}")'>Add Payment</button></div>`).join('')||'<div>No pending dues.</div>'}</div><div class='card'><h3>Recent 8 Transactions</h3>${state.payments.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8).map(p=>`<div>${byId(p.studentId)?.name||'-'} ${money(p.amount)} • ${p.forMonth}</div>`).join('')||'<div>No transactions yet.</div>'}</div></div>`;
if(view==='students')return studentsPage(); if(view==='payments')return paymentsPage(); if(view==='facilities')return facilitiesPage(); if(view==='contact')return contactPage(); return credentialsPage();}
function studentsPage(){const q=(state.search||'').toLowerCase(), g=state.filterGender||'All', st=state.filterStatus||'All'; const list=state.students.filter(s=>(`${s.name} ${s.phone} ${s.seat} ${s.education} ${s.college}`).toLowerCase().includes(q)&&(g==='All'||s.gender===g)&&(st==='All'||s.status===st));
return `<div class='card'><h3>Register Student</h3><div class='row row-3'><input id='sn' placeholder='Full Name*'><input id='sm' placeholder='Mobile Number*'><input id='su' placeholder='Username*'><input id='sp' placeholder='Password*'><select id='sg'><option>Boy</option><option>Girl</option></select><input id='ss' placeholder='Seat Number'><input id='se' placeholder='Education'><input id='sc' placeholder='College/School Name'><input id='sa' placeholder='Address'><input id='sad' placeholder='Aadhaar last 4 (optional)'><select id='st'><option>Active</option><option>Inactive</option><option>Left</option></select><input id='sj' type='date' value='${now()}'><input id='sl' type='date'><select id='sf'><option value='500'>₹500 Standard</option><option value='450'>₹450 Concession</option></select><button onclick='addStudent()'>Save</button></div></div>
<div class='card'><div class='row row-3'><input placeholder='Search by name/phone/seat/education/college' value='${state.search||''}' oninput='state.search=this.value;renderAdmin()'><select onchange='state.filterGender=this.value;renderAdmin()'><option ${g==='All'?'selected':''}>All</option><option ${g==='Boy'?'selected':''}>Boy</option><option ${g==='Girl'?'selected':''}>Girl</option></select><select onchange='state.filterStatus=this.value;renderAdmin()'><option ${st==='All'?'selected':''}>All</option><option ${st==='Active'?'selected':''}>Active</option><option ${st==='Inactive'?'selected':''}>Inactive</option><option ${st==='Left'?'selected':''}>Left</option></select></div><div class='students'>${list.map(s=>`<div class='card student'><b>${s.name}</b><div>${s.phone}</div><div>Seat: ${s.seat||'-'}</div><span class='badge ${s.gender==='Boy'?'b-blue':'b-pink'}'>${s.gender}</span> <span class='badge ${s.status==='Active'?'b-green':'b-gray'}'>${s.status}</span><div><span style='color:#16a34a'>Paid ${money(paid(s))}</span> • <span style='color:#dc2626'>Due ${money(due(s))}</span></div><button onclick='profile("${s.id}")'>View</button> <button onclick='openPay("${s.id}")'>+Pay</button></div>`).join('')||'<div>No students found.</div>'}</div></div>`}
function addStudent(){const data={name:$('sn').value.trim(),phone:$('sm').value.trim(),credentials:{username:$('su').value.trim(),password:$('sp').value,createdBy:state.admin.username,createdDate:now()},gender:$('sg').value,seat:$('ss').value.trim(),education:$('se').value.trim(),college:$('sc').value.trim(),address:$('sa').value.trim(),aadhaar:$('sad').value.trim(),status:$('st').value,joinDate:$('sj').value,leaveDate:$('sl').value,fee:Number($('sf').value),id:crypto.randomUUID()};
if(!data.name||!data.phone||!data.credentials.username||!data.credentials.password)return alert('Name, phone, username and password are required'); if(!uname(data.credentials.username))return alert('Username must be 4-20 letters/numbers/underscore, no spaces'); if(!pass(data.credentials.password))return alert('Password must be at least 6'); if(usernames().includes(data.credentials.username))return alert('Username already taken'); state.students.push(data); save(); renderAdmin();}
function openPay(id){const s=byId(id); document.body.insertAdjacentHTML('beforeend',`<div id='m1' class='modal'><div class='card'><h3>Add Payment — ${s.name}</h3><p>Total Paid: ${money(paid(s))} | Current Balance: ${money(due(s))}</p><div class='row'><input id='pd' type='date' value='${now()}'><input id='pa' type='number' min='1' placeholder='Amount'><input id='pm' placeholder='For Month e.g. May 2025' value='${month(new Date())}'><textarea id='pn' placeholder='Note (optional)'></textarea><div style='font-size:12px;color:#6b7280'>Standard ₹500, Concession ₹450</div><button onclick='savePay("${id}")'>Save Payment</button><button onclick='closeM("m1")'>Close</button></div></div></div>`)}
function savePay(id){const amount=Number($('pa').value||0); if(amount<=0)return alert('Amount must be greater than 0'); state.payments.push({studentId:id,date:$('pd').value,amount,forMonth:$('pm').value.trim(),note:$('pn').value.trim()}); save(); closeM('m1'); renderAdmin();}
function profile(id){const s=byId(id); const history=state.payments.filter(p=>p.studentId===id).sort((a,b)=>b.date.localeCompare(a.date)); const pend=due(s); document.body.insertAdjacentHTML('beforeend',`<div id='m2' class='modal'><div class='card'><h3>${s.name}</h3><p><b>Login Username:</b> ${s.credentials.username}</p><p>${s.phone} • Seat ${s.seat||'-'} • <span class='badge ${s.gender==='Boy'?'b-blue':'b-pink'}'>${s.gender}</span> <span class='badge ${s.status==='Active'?'b-green':'b-gray'}'>${s.status}</span></p><div class='row row-2'><div class='card'>Total Paid <span style='color:#16a34a'>${money(paid(s))}</span></div><div class='card'>Total Due <span style='color:#f59e0b'>${money(pend)}</span></div></div><p>${s.education||'-'} | ${s.college||'-'}</p><p>${s.address||'-'} | Aadhaar: ${s.aadhaar||'-'} | Join: ${s.joinDate||'-'} | Leave: ${s.leaveDate||'-'}</p><h4>Payment History</h4><div style='max-height:200px;overflow:auto'>${history.map(p=>`<div>${p.date} • ${p.forMonth} • <span style='color:${Number(p.amount)<500?'#f59e0b':'#16a34a'}'>${money(p.amount)}</span> ${p.note||''}</div>`).join('')||'No payments yet.'}</div><button onclick='editCred("${id}")'>Edit Credentials</button> <button onclick='openPay("${id}")'>Add Payment</button> <button onclick='closeM("m2")'>Close</button></div></div>`)}
function editCred(id){const s=byId(id); document.body.insertAdjacentHTML('beforeend',`<div id='m3' class='modal'><div class='card'><h3>Edit Credentials</h3><input id='eu' value='${s.credentials.username}'><input id='ep' value='${s.credentials.password}'><button onclick='saveCred("${id}")'>Save</button><button onclick='resetPass("${id}")'>Reset Password</button><button onclick='closeM("m3")'>Close</button></div></div>`)}
function saveCred(id){const u=$('eu').value.trim(),p=$('ep').value; if(!uname(u))return alert('Invalid username format'); if(!pass(p))return alert('Password min 6'); if(u===state.admin.username)return alert('Username cannot match admin username'); if(state.students.some(x=>x.id!==id&&x.credentials.username===u))return alert('Username already used'); const s=byId(id); s.credentials.username=u; s.credentials.password=p; save(); closeM('m3'); closeM('m2'); renderAdmin();}
function resetPass(id){byId(id).credentials.password='reset1234'; save(); alert('Temporary password set: reset1234'); closeM('m3'); closeM('m2'); renderAdmin();}
function paymentsPage(){const t=totals(); return `<div class='stats'><div class='card'>Total Collected ${money(t.all)}</div><div class='card'>This Month ${money(t.month)}</div><div class='card'>Total Transactions ${state.payments.length}</div><div class='card'>Pending Students ${t.pending}</div></div><div class='card'><h3>Transactions (Newest First)</h3><table class='table'><tr><th>Student</th><th>Phone</th><th>Gender</th><th>Date</th><th>Month</th><th>Amount</th><th>Note</th></tr>${state.payments.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(p=>{const s=byId(p.studentId)||{};return `<tr><td>${s.name||'-'}</td><td>${s.phone||'-'}</td><td>${s.gender||'-'}</td><td>${p.date}</td><td>${p.forMonth}</td><td>${money(p.amount)}</td><td>${p.note||''}</td></tr>`}).join('')}</table></div><div class='card'><h3>Student-wise Fee Status</h3><table class='table'><tr><th>Student</th><th>Seat</th><th>Monthly Fee</th><th>Total Paid</th><th>Remaining</th><th>Last Payment</th><th>Status</th></tr>${state.students.map(s=>{const last=state.payments.filter(p=>p.studentId===s.id).sort((a,b)=>b.date.localeCompare(a.date))[0]?.date||'-'; return `<tr><td>${s.name}</td><td>${s.seat||'-'}</td><td>${money(s.fee||500)}</td><td>${money(paid(s))}</td><td>${money(due(s))}</td><td>${last}</td><td>${s.status}</td></tr>`}).join('')}</table></div>`}
function facilitiesPage(){const amenities=[['❄️','AC Available'],['📶','Free Wi‑Fi'],['👩','Girls Section'],['🔌','Charging at every seat'],['🕛','24 Hours Open'],['📹','CCTV Security'],['🧘','Peaceful Space'],['💺','Comfortable Seats']]; return `<div class='hero'><h2>Bharat Abhyasika</h2><p>24-Hour Peaceful Study Environment for Boys and Girls</p></div><div class='amen'>${amenities.map(a=>`<div class='card'><div style='font-size:30px'>${a[0]}</div><b>${a[1]}</b><p style='color:#6b7280;font-size:13px'>High quality facility for focused study.</p></div>`).join('')}</div><div class='card'><h3>Fee Structure</h3><div class='row row-2'><div class='card'>₹500 Standard</div><div class='card'>₹450 Concession</div></div></div>`}
function contactPage(){return `<div class='row row-2'><div class='card'><h3>Contact Details</h3><p>Owner: Bharat Malik</p><p><a href='tel:08421943463'>08421943463</a></p><p>Bharat Abhyasika 1, MH SH 77, Prakash Nagar, Arvi, Khadgaon, Maharashtra 413531</p></div><div class='card'><h3>Timings</h3><div class='badge b-green'>24 Hours Open every day including holidays</div><div class='row row-2' style='margin-top:10px'><div class='card' style='background:#dbeafe'>Boys Area</div><div class='card' style='background:#fce7f3'>Girls Area</div></div></div></div>`}
function credentialsPage(){return `<div class='card'><h3>Credentials</h3><table class='table'><tr><th>Student Name</th><th>Username</th><th>Password</th><th>Created Date</th><th>Actions</th></tr>${state.students.map(s=>`<tr><td>${s.name}</td><td>${s.credentials.username}</td><td><span id='pw_${s.id}'>••••••</span> <button onclick='togglePw("${s.id}","${s.credentials.password}")'>👁️</button></td><td>${s.credentials.createdDate||'-'}</td><td><button onclick='profile("${s.id}")'>Edit</button> <button onclick='resetPass("${s.id}")'>Reset</button></td></tr>`).join('')}</table></div>`}
function togglePw(id,p){const n=$(`pw_${id}`); n.textContent=n.textContent.includes('•')?p:'••••••';}
function renderStudent(){const s=byId(state.current.id); $('app').innerHTML=`<div class='top'><h2>Student Portal</h2><button onclick='logout()'>Logout</button></div><div class='card'><h3>${s.name}</h3><p>Phone ${s.phone} • Seat ${s.seat||'-'} • ${s.gender} • ${s.status}</p><h4>Payment History</h4>${state.payments.filter(p=>p.studentId===s.id).sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`<div>${p.date} • ${p.forMonth} • ${money(p.amount)}</div>`).join('')||'No payments yet.'}</div>`}
function closeM(id){const el=$(id); if(el)el.remove();}
function logout(){state.current=null; save(); render();}
render();
</script>
</body></html>
