<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bharat Abhyasika Management</title>
  <style>
    :root{--bg:#0c1630;--bg2:#152a54;--card:#ffffff;--muted:#6b7280;--ok:#16a34a;--warn:#f59e0b;--danger:#dc2626;--blue:#2563eb}
    body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb;color:#111}
    .hidden{display:none!important}.app{max-width:1250px;margin:0 auto;padding:16px}
    .login-wrap{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--bg),var(--bg2));color:#fff}
    .logo{font-size:40px;font-weight:700;text-align:center}.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 10px 26px rgba(0,0,0,.08)}
    .login-card{width:min(420px,92vw)} input,select,button,textarea{width:100%;padding:10px;border:1px solid #d7dce5;border-radius:8px;box-sizing:border-box}
    button{background:#1e40af;color:#fff;border:none;cursor:pointer}.err{color:#ffb4b4;font-size:13px}.grid{display:grid;gap:12px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav button{width:auto;padding:8px 12px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .students{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.student{transition:.2s}.student:hover{transform:translateY(-5px)}
    .badge{padding:2px 8px;border-radius:12px;font-size:12px;color:#fff}.b-blue{background:#2563eb}.b-pink{background:#db2777}.b-green{background:#16a34a}.b-orange{background:#f59e0b}.b-gray{background:#6b7280}
    .small{font-size:12px;color:#6b7280}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #e8ebf2;padding:8px;text-align:left;font-size:13px}
    .hero{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;border-radius:14px;padding:20px}.amen{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:grid;place-items:center;padding:10px}.modal .card{max-height:92vh;overflow:auto;width:min(720px,95vw)}
  </style>
</head><body>
<div id="login" class="login-wrap"></div>
<div id="app" class="app hidden"></div>
<script>
const KEY='bharatAbhyasikaStateV2';
const state=JSON.parse(localStorage.getItem(KEY)||'{"admin":null,"current":null,"students":[],"payments":[]}');
const save=()=>localStorage.setItem(KEY,JSON.stringify(state));
const rs=n=>Array.from(n).reduce((a,b)=>a+b,0);
const now=()=>new Date().toISOString().slice(0,10);
const money=n=>'₹'+(n||0);
const fee= s=>s?.fee||500;
const byId=id=>state.students.find(s=>s.id===id);
function monthKey(d){const x=new Date(d);return x.toLocaleString('en-US',{month:'short',year:'numeric'})}
function unameValid(u){return /^[A-Za-z0-9_]{4,20}$/.test(u)}
function pValid(p){return (p||'').length>=6}
function allUsernames(){return [state.admin?.username,...state.students.map(s=>s.credentials?.username)].filter(Boolean)}
function loginUI(msg=''){document.getElementById('app').classList.add('hidden');const root=document.getElementById('login');
 if(!state.admin){root.innerHTML=`<div class='card login-card'><div class='logo'>भारत</div><h3>Admin First-Time Setup</h3><p class='small'>Create your owner account once.</p><div class='grid'><input id='an' placeholder='Admin Full Name'><input id='au' placeholder='Choose Username'><input id='ap' type='password' placeholder='Choose Password'><input id='ac' type='password' placeholder='Confirm Password'><button onclick='setupAdmin()'>Create Admin</button>${msg?`<div class='err'>${msg}</div>`:''}</div></div>`;return;}
 root.innerHTML=`<div class='card login-card'><div class='logo'>भारत</div><h3>Bharat Abhyasika Login</h3><div class='grid'><input id='lu' placeholder='Username'><input id='lp' type='password' placeholder='Password'><button onclick='doLogin()'>Login</button>${msg?`<div class='err'>${msg}</div>`:''}<p class='small'>Contact your admin if you forgot your login details — 08421943463</p></div></div>`;
}
function setupAdmin(){const n=an.value.trim(),u=au.value.trim(),p=ap.value,c=ac.value;if(!n)return loginUI('Admin name required');if(!unameValid(u))return loginUI('Username must be 4-20 chars, letters numbers underscore only');if(!pValid(p))return loginUI('Password minimum 6 chars');if(p!==c)return loginUI('Passwords do not match');state.admin={name:n,username:u,password:p,createdDate:now()};save();render();}
function doLogin(){const u=lu.value.trim(),p=lp.value;if(state.admin&&u===state.admin.username&&p===state.admin.password){state.current={role:'admin'};save();return render();}const s=state.students.find(x=>x.credentials?.username===u&&x.credentials?.password===p);if(!s)return loginUI('Invalid username or password');state.current={role:'student',id:s.id};save();render();}
function totals(){const active=state.students.filter(s=>s.status==='Active').length;const boys=state.students.filter(s=>s.status==='Active'&&s.gender==='Boy').length;const girls=state.students.filter(s=>s.status==='Active'&&s.gender==='Girl').length;const all=rs(state.payments.map(p=>+p.amount));const m=monthKey(new Date());const mt=rs(state.payments.filter(p=>p.forMonth===m).map(p=>+p.amount));const pending=state.students.filter(s=>due(s)>0).length;return {active,boys,girls,all,mt,pending}}
function paid(s){return rs(state.payments.filter(p=>p.studentId===s.id).map(p=>+p.amount))}
function due(s){const months=Math.max(1,((new Date().getFullYear()-new Date(s.joinDate).getFullYear())*12)+(new Date().getMonth()-new Date(s.joinDate).getMonth())+1);return months*fee(s)-paid(s)}
function render(){if(!state.current)return loginUI();document.getElementById('login').classList.add('hidden');const root=document.getElementById('app');root.classList.remove('hidden');if(state.current.role==='admin') return renderAdmin(); else return renderStudent();}
function tabs(){return ['dashboard','students','payments','facilities','contact','credentials'].map(t=>`<button onclick="view='${t}';renderAdmin()">${t}</button>`).join('')}
let view='dashboard';
function renderAdmin(){const t=totals();app.innerHTML=`<div class='top'><h2>Bharat Abhyasika Admin</h2><div class='nav'>${tabs()}<button onclick='logout()'>Logout</button></div></div>${page(t)}`}
function page(t){if(view==='dashboard')return `<div class='stats'>${stat(`Active ${t.active} (B:${t.boys} G:${t.girls})`)}${stat('Total Collected '+money(t.all))}${stat('This Month '+money(t.mt))}${stat('Pending Students '+t.pending)}</div><div class='row'><div class='card'><h4>Pending Fees</h4>${state.students.filter(s=>due(s)>0).map(s=>`<div>${s.name} (${money(due(s))}) <button onclick='openPay("${s.id}")'>Add Payment</button></div>`).join('')}</div><div class='card'><h4>Recent Transactions</h4>${state.payments.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8).map(p=>`<div>${byId(p.studentId)?.name} ${money(p.amount)} ${p.forMonth}</div>`).join('')}</div></div>`;
if(view==='students') return studentsPage(); if(view==='payments')return paymentsPage(); if(view==='facilities')return facilities(); if(view==='contact') return contact(); if(view==='credentials')return credentials();}
const stat=t=>`<div class='card'>${t}</div>`;
function studentsPage(){return `<div class='card'><h3>Register Student</h3><div class='grid' style='grid-template-columns:repeat(3,1fr)'><input id='sn' placeholder='Full Name'><input id='sm' placeholder='Mobile Number'><input id='sp' placeholder='Username'><input id='sw' placeholder='Password'><select id='sg'><option>Boy</option><option>Girl</option></select><input id='ss' placeholder='Seat Number'><input id='se' placeholder='Education'><input id='sc' placeholder='College/School'><input id='sa' placeholder='Address'><input id='sad' placeholder='Aadhaar last 4 (optional)'><select id='st'><option>Active</option><option>Inactive</option><option>Left</option></select><input id='sj' type='date' value='${now()}'><input id='sl' type='date'><select id='sf'><option value='500'>₹500</option><option value='450'>₹450 Concession</option></select><button onclick='addStudent()'>Save Student</button></div></div><div class='card'><h3>Students</h3><div class='students'>${state.students.map(s=>`<div class='card student'><b>${s.name}</b><div>${s.phone}</div><div>Seat ${s.seat}</div><span class='badge ${s.gender==='Boy'?'b-blue':'b-pink'}'>${s.gender}</span> <span class='badge ${s.status==='Active'?'b-green':'b-gray'}'>${s.status}</span><div>Paid <span style='color:green'>${money(paid(s))}</span> Due <span style='color:red'>${money(due(s))}</span></div><button onclick='profile("${s.id}")'>View</button> <button onclick='openPay("${s.id}")'>+Pay</button></div>`).join('')}</div></div>`}
function addStudent(){const s={name:sn.value.trim(),phone:sm.value.trim(),credentials:{username:sp.value.trim(),password:sw.value,createdBy:state.admin.username,createdDate:now()},gender:sg.value,seat:ss.value,education:se.value,college:sc.value,address:sa.value,aadhaar:sad.value,status:st.value,joinDate:sj.value,leaveDate:sl.value,fee:+sf.value,id:crypto.randomUUID()};if(!s.name||!s.phone||!s.credentials.password)return alert('Name, phone, username, password required');if(!unameValid(s.credentials.username))return alert('Invalid username format');if(!pValid(s.credentials.password))return alert('Password min 6');if(allUsernames().includes(s.credentials.username))return alert('Username already taken');state.students.push(s);save();renderAdmin()}
function openPay(id){const s=byId(id);const bal=due(s);document.body.insertAdjacentHTML('beforeend',`<div id='m' class='modal'><div class='card'><h3>Add Payment - ${s.name}</h3><p>Total Paid: ${money(paid(s))} | Current Balance: ${money(bal)}</p><div class='grid'><input id='pd' type='date' value='${now()}'><input id='pa' type='number' placeholder='Amount'><input id='pm' placeholder='For Month ex: May 2025' value='${monthKey(new Date())}'><textarea id='pn' placeholder='Note(optional)'></textarea><div class='small'>Standard ₹500, concession ₹450</div><button onclick='savePay("${id}")'>Save</button><button onclick='m.remove()'>Close</button></div></div></div>`)}
function savePay(id){state.payments.push({studentId:id,date:pd.value,amount:+pa.value,forMonth:pm.value,note:pn.value});save();m.remove();renderAdmin()}
function profile(id){const s=byId(id);document.body.insertAdjacentHTML('beforeend',`<div id='m' class='modal'><div class='card'><h3>${s.name}</h3><p>Login Username: <b>${s.credentials.username}</b></p><p>${s.phone} | Seat ${s.seat} | <span class='badge ${s.gender==='Boy'?'b-blue':'b-pink'}'>${s.gender}</span> <span class='badge ${s.status==='Active'?'b-green':'b-gray'}'>${s.status}</span></p><p>${s.education}, ${s.college}</p><div class='row'><div class='card'>Total Paid <span style='color:green'>${money(paid(s))}</span></div><div class='card'>Total Due <span style='color:#ca8a04'>${money(due(s))}</span></div></div><h4>Payment History</h4><div style='max-height:180px;overflow:auto'>${state.payments.filter(p=>p.studentId===id).map(p=>`<div>${p.date} ${p.forMonth} <span style='color:${p.amount<500?'#f59e0b':'#16a34a'}'>${money(p.amount)}</span> ${p.note||''}</div>`).join('')}</div><button onclick='editCred("${id}")'>Edit Credentials</button> <button onclick='openPay("${id}")'>Add Payment</button> <button onclick='m.remove()'>Close</button></div></div>`)}
function editCred(id){const s=byId(id);document.body.insertAdjacentHTML('beforeend',`<div id='m2' class='modal'><div class='card'><h3>Edit Credentials</h3><input id='eu' value='${s.credentials.username}'><input id='ep' value='${s.credentials.password}'><button onclick='saveCred("${id}")'>Save</button><button onclick='resetPass("${id}")'>Reset to reset1234</button></div></div>`)}
function saveCred(id){const s=byId(id),u=eu.value.trim(),p=ep.value;if(!unameValid(u))return alert('Username invalid');if(!pValid(p))return alert('Password min 6');if(u===state.admin.username)return alert('Cannot match admin username');if(state.students.some(x=>x.id!==id&&x.credentials.username===u))return alert('Username already in use');s.credentials.username=u;s.credentials.password=p;save();m2.remove();m.remove();renderAdmin()}
function resetPass(id){byId(id).credentials.password='reset1234';save();alert('Temporary password: reset1234');m2.remove();m.remove();renderAdmin()}
function paymentsPage(){const t=totals();return `<div class='stats'>${stat('Total '+money(t.all))}${stat('This Month '+money(t.mt))}${stat('Transactions '+state.payments.length)}${stat('Pending '+t.pending)}</div><div class='card'><h3>Transactions</h3><table class='table'><tr><th>Student</th><th>Phone</th><th>Gender</th><th>Date</th><th>Month</th><th>Amount</th><th>Note</th></tr>${state.payments.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(p=>{const s=byId(p.studentId)||{};return `<tr><td>${s.name||''}</td><td>${s.phone||''}</td><td>${s.gender||''}</td><td>${p.date}</td><td>${p.forMonth}</td><td>${money(p.amount)}</td><td>${p.note||''}</td></tr>`}).join('')}</table></div><div class='card'><h3>Student Fee Status</h3><table class='table'><tr><th>Student</th><th>Seat</th><th>Monthly Fee</th><th>Total Paid</th><th>Remaining</th><th>Last Payment</th><th>Status</th></tr>${state.students.map(s=>{const last=state.payments.filter(p=>p.studentId===s.id).sort((a,b)=>b.date.localeCompare(a.date))[0]?.date||'-';return `<tr><td>${s.name}</td><td>${s.seat}</td><td>${money(fee(s))}</td><td>${money(paid(s))}</td><td>${money(due(s))}</td><td>${last}</td><td>${s.status}</td></tr>`}).join('')}</table></div>`}
function credentials(){return `<div class='card'><h3>Credentials Management</h3><table class='table'><tr><th>Student</th><th>Username</th><th>Password</th><th>Created Date</th><th>Actions</th></tr>${state.students.map(s=>`<tr><td>${s.name}</td><td>${s.credentials.username}</td><td><span id='p_${s.id}'>••••••</span> <button onclick='toggle("${s.id}","${s.credentials.password}")'>👁️</button></td><td>${s.credentials.createdDate||'-'}</td><td><button onclick='profile("${s.id}")'>Edit</button> <button onclick='resetPass("${s.id}")'>Reset</button></td></tr>`).join('')}</table></div>`}
function toggle(id,p){const x=document.getElementById('p_'+id);x.textContent=x.textContent.includes('•')?p:'••••••'}
function facilities(){return `<div class='hero'><h2>Bharat Abhyasika</h2><p>24-Hour Peaceful Study Environment for Boys and Girls</p></div><div class='amen'>${[['❄️','AC Available'],['📶','Free Wi‑Fi'],['👩','Girls Section'],['🔌','Charging at every seat'],['🕛','24 Hours Open'],['📹','CCTV Security'],['🧘','Peaceful Space'],['💺','Comfortable Seats']].map(a=>`<div class='card'><div style='font-size:30px'>${a[0]}</div><b>${a[1]}</b><p class='small'>Well maintained facility.</p></div>`).join('')}</div><div class='card'><h3>Fee Structure</h3><div class='row'><div class='card'>₹500 Standard</div><div class='card'>₹450 Concession</div></div></div>`}
function contact(){return `<div class='row'><div class='card'><h3>Contact</h3><p>Owner: Bharat Malik</p><p><a href='tel:08421943463'>08421943463</a></p><p>Bharat Abhyasika 1, MH SH 77, Prakash Nagar, Arvi, Khadgaon, Maharashtra 413531</p></div><div class='card'><h3>Timings</h3><div class='badge b-green'>24 Hours Open every day including holidays</div><div class='row'><div class='card' style='background:#dbeafe'>Boys Area</div><div class='card' style='background:#fce7f3'>Girls Area</div></div></div></div>`}
function renderStudent(){const s=byId(state.current.id);app.innerHTML=`<div class='top'><h2>Student Portal</h2><button onclick='logout()'>Logout</button></div><div class='card'><h3>${s.name}</h3><p>Phone: ${s.phone} | Seat: ${s.seat}</p><p>Status: ${s.status} | Gender: ${s.gender}</p><h4>Payment History</h4>${state.payments.filter(p=>p.studentId===s.id).map(p=>`<div>${p.date} ${p.forMonth} ${money(p.amount)}</div>`).join('')}</div>`}
function logout(){state.current=null;save();document.getElementById('login').classList.remove('hidden');render()}
render();
</script></body></html>
